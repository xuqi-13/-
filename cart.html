<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>购物车 - 乐选购</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <div id="commonTopBar"></div>
    <div id="commonHeader"></div>

    <div class="container cart-page">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2>🛒 我的购物车</h2>
            <button id="btnClearCart" style="background:var(--jd-red);color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:14px;">清空购物车</button>
        </div>
        <div id="cartContent"></div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="student-info">学号：24215220111 &nbsp;&nbsp; 姓名：张乐 &nbsp;&nbsp; 《Web编程技术》大作业</p>
            <p>Copyright © 2024-2026 乐选购LEXUAN.com 版权所有</p>
        </div>
    </div>

    <script src="js/data.js?v=2"></script>
    <script>
        initCommonHeader();

        function renderCart() {
            var cart = CartManager.getCart();
            var container = document.getElementById('cartContent');

            if (cart.length === 0) {
                container.innerHTML =
                    '<div class="empty-cart">' +
                        '<div class="empty-icon">🛒</div>' +
                        '<p>购物车还是空的，快去逛逛吧！</p>' +
                        '<a href="index.html" class="btn-go-shopping">去购物</a>' +
                    '</div>';
                return;
            }

            var rowsHtml = '';
            for (var i = 0; i < cart.length; i++) {
                var item = cart[i];
                var product = JDData.getProductById(item.productId);
                var imgUrl = '';
                var itemName = item.name || '未知商品';
                var itemPrice = item.price || 0;
                var imgColor = item.imgColor || '#ccc';

                if (product) {
                    imgUrl = product.img || '';
                    itemName = product.name || item.name;
                    itemPrice = product.price || item.price;
                    imgColor = product.imgColor || item.imgColor;
                }
                if (!imgUrl) {
                    imgUrl = item.img || '';
                }

                var imgHtml = imgUrl
                    ? '<img src="' + imgUrl + '" alt="' + itemName + '" style="width:100%;height:100%;object-fit:contain;background:#fff;">'
                    : '<span style="color:rgba(255,255,255,0.6);">' + itemName.charAt(0) + '</span>';

                var checkedClass = item.checked ? 'checked' : '';
                var checkMark = item.checked ? '&#10003;' : '';

                rowsHtml +=
                    '<tr>' +
                        '<td>' +
                            '<span class="custom-checkbox ' + checkedClass + '" onclick="toggleItem(' + item.id + ')">' + checkMark + '</span>' +
                        '</td>' +
                        '<td>' +
                            '<div class="cart-product">' +
                                '<div class="cart-product-img" style="background:' + imgColor + ';">' + imgHtml + '</div>' +
                                '<div>' +
                                    '<div class="cart-product-name">' + itemName + '</div>' +
                                    '<div class="cart-product-spec">规格：' + (item.spec || '默认') + '</div>' +
                                '</div>' +
                            '</div>' +
                        '</td>' +
                        '<td style="text-align:center;">' + formatPrice(itemPrice) + '</td>' +
                        '<td style="text-align:center;">' +
                            '<div class="qty-control">' +
                                '<button class="qty-btn" onclick="changeItemQty(' + item.id + ', -1)">-</button>' +
                                '<input type="text" value="' + item.quantity + '" onchange="setItemQty(' + item.id + ', this.value)">' +
                                '<button class="qty-btn" onclick="changeItemQty(' + item.id + ', 1)">+</button>' +
                            '</div>' +
                        '</td>' +
                        '<td style="text-align:center;color:var(--jd-red);font-weight:bold;">' + formatPrice(itemPrice * item.quantity) + '</td>' +
                        '<td style="text-align:center;"><button class="btn-delete" onclick="removeItem(' + item.id + ')">删除</button></td>' +
                    '</tr>';
            }

            var allChecked = true;
            for (var j = 0; j < cart.length; j++) {
                if (!cart[j].checked) { allChecked = false; break; }
            }
            var checkedCount = CartManager.getCheckedCount();
            var totalPrice = CartManager.getTotalPrice();
            var allCheckClass = allChecked ? 'checked' : '';
            var allCheckMark = allChecked ? '&#10003;' : '';

            container.innerHTML =
                '<table class="cart-table">' +
                    '<thead>' +
                        '<tr>' +
                            '<th class="col-check"><span class="custom-checkbox ' + allCheckClass + '" onclick="toggleAll()">' + allCheckMark + '</span></th>' +
                            '<th class="col-product">商品</th>' +
                            '<th class="col-price">单价</th>' +
                            '<th class="col-qty">数量</th>' +
                            '<th class="col-subtotal">小计</th>' +
                            '<th class="col-action">操作</th>' +
                        '</tr>' +
                    '</thead>' +
                    '<tbody>' + rowsHtml + '</tbody>' +
                '</table>' +
                '<div class="cart-footer">' +
                    '<div class="select-all">' +
                        '<span class="custom-checkbox ' + allCheckClass + '" onclick="toggleAll()">' + allCheckMark + '</span>' +
                        '<span>全选</span>' +
                        '<a href="javascript:void(0)" onclick="removeChecked()" style="margin-left:15px;color:#999;font-size:13px;">删除选中</a>' +
                    '</div>' +
                    '<div class="cart-summary">' +
                        '<div class="summary-text">已选 <span>' + checkedCount + '</span> 件商品</div>' +
                        '<div class="summary-text">合计：</div>' +
                        '<div class="total-price"><small>¥</small>' + totalPrice.toFixed(2) + '</div>' +
                        '<button class="btn-checkout" onclick="checkout()"' + (checkedCount === 0 ? ' disabled' : '') + '>去结算</button>' +
                    '</div>' +
                '</div>';
        }

        function toggleAll() {
            var cart = CartManager.getCart();
            var allChecked = true;
            for (var i = 0; i < cart.length; i++) {
                if (!cart[i].checked) { allChecked = false; break; }
            }
            CartManager.toggleAllCheck(!allChecked);
            renderCart();
        }

        function toggleItem(id) {
            CartManager.toggleCheck(id);
            renderCart();
        }

        function changeItemQty(id, delta) {
            var cart = CartManager.getCart();
            var item = null;
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) { item = cart[i]; break; }
            }
            if (!item) return;
            var newQty = item.quantity + delta;
            if (newQty <= 0) {
                if (confirm('确定要删除该商品吗？')) {
                    CartManager.removeItem(id);
                    showToast('已删除');
                    renderCart();
                }
                return;
            }
            CartManager.updateQuantity(id, newQty);
            renderCart();
        }

        function setItemQty(id, value) {
            var qty = parseInt(value) || 1;
            CartManager.updateQuantity(id, qty);
            renderCart();
        }

        function removeItem(id) {
            if (confirm('确定要删除该商品吗？')) {
                CartManager.removeItem(id);
                showToast('已删除');
                renderCart();
            }
        }

        function removeChecked() {
            if (CartManager.getCheckedCount() === 0) {
                showToast('请先选择商品');
                return;
            }
            if (confirm('确定要删除选中的商品吗？')) {
                CartManager.clearChecked();
                showToast('已删除选中商品');
                renderCart();
            }
        }

        function checkout() {
            if (!UserManager.getCurrentUser()) {
                if (confirm('请先登录后再结算，是否前往登录？')) {
                    window.location.href = 'login.html';
                }
                return;
            }
            if (CartManager.getCheckedCount() === 0) {
                showToast('请先选择商品');
                return;
            }
            window.location.href = 'order.html';
        }

        renderCart();

        // 绑定清空购物车按钮事件
        document.getElementById('btnClearCart').addEventListener('click', function() {
            console.log('清空购物车按钮被点击了！');
            var cart = CartManager.getCart();
            console.log('当前购物车:', JSON.stringify(cart));
            if (cart.length === 0) {
                alert('购物车已经是空的');
                return;
            }
            if (confirm('确定要清空购物车吗？此操作不可恢复。')) {
                localStorage.setItem('jd_cart', '[]');
                CartManager.updateCartCount();
                alert('购物车已清空！');
                renderCart();
            }
        });
    </script>
</body>
</html>
