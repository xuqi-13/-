<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品搜索 - 乐选购</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div id="commonTopBar"></div>
    <div id="commonHeader"></div>

    <div class="container" style="padding:20px 0;">
        <div id="searchResults">
            <div style="text-align:center;padding:60px 0;font-size:16px;color:#999;">搜索中...</div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="student-info">学号：24215220111 &nbsp;&nbsp; 姓名：张乐 &nbsp;&nbsp; 《Web编程技术》大作业</p>
            <p>Copyright © 2024-2026 乐选购LEXUAN.com 版权所有</p>
        </div>
    </div>

    <script src="js/data.js?v=2"></script>
    <script>
        initCommonHeader();

        const keyword = getUrlParam('q');
        const categoryId = getUrlParam('cat');
        let results = [];

        if (keyword) {
            results = JDData.searchProducts(keyword);
        } else if (categoryId) {
            results = JDData.getProductsByCategory(parseInt(categoryId));
        }

        const container = document.getElementById('searchResults');
        const category = categoryId ? JDData.categories.find(c => c.id === parseInt(categoryId)) : null;

        let title = '';
        if (keyword && category) {
            title = `"${keyword}" - ${category.name}`;
        } else if (keyword) {
            title = `搜索 "${keyword}"`;
        } else if (category) {
            title = category.icon + ' ' + category.name;
        }

        document.title = (title || '商品列表') + ' - 乐选购';

        if (results.length === 0) {
            container.innerHTML = `
                <div style="text-align:center;padding:80px 0;">
                    <div style="font-size:60px;margin-bottom:20px;">🔍</div>
                    <p style="font-size:18px;color:#666;margin-bottom:10px;">没有找到相关商品</p>
                    <p style="font-size:14px;color:#999;margin-bottom:20px;">换个关键词试试吧</p>
                    <a href="index.html" class="btn btn-primary btn-lg">返回首页</a>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div style="font-size:20px;font-weight:bold;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #eee;">
                    ${title || '全部商品'}
                    <span style="font-size:14px;color:#999;font-weight:normal;">（共${results.length}件商品）</span>
                </div>
                <div class="product-grid">
                    ${results.map(p => {
                        const imgHtml = p.img ? `<img src="${p.img}" alt="${p.name}" style="width:100%;height:100%;object-fit:contain;">` : `<span style="font-size:50px;color:rgba(255,255,255,0.6);">${p.name.charAt(0)}</span>`;
                        return `
                        <div class="product-card" onclick="location.href='detail.html?id=${p.id}'">
                            <div class="product-img" style="background:${p.imgColor};">
                                ${p.tag ? `<span class="product-tag">${p.tag}</span>` : ''}
                                ${imgHtml}
                            </div>
                            <div class="product-info">
                                <div class="product-name">${p.name}</div>
                                <div class="product-price"><small>¥</small>${p.price}</div>
                                <div class="product-sold">已售 ${p.sold > 10000 ? (p.sold/10000).toFixed(1)+'万' : p.sold}+ 件</div>
                            </div>
                        </div>
                    `}).join('')}
                </div>
            `;
        }

        // 搜索框回填关键词
        if (keyword) {
            document.getElementById('searchInput').value = keyword;
        }
    </script>
</body>
</html>
