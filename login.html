<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐选购登录 - 欢迎登录乐选购</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <!-- 登录头部 -->
    <div class="auth-header">
        <div class="container">
            <div class="logo">
                <a href="index.html">乐选购<span style="font-size:16px;color:#999;margin-left:8px;">欢迎登录</span></a>
            </div>
        </div>
    </div>

    <!-- 登录表单 -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="tab active" onclick="switchTab('login')">密码登录</div>
                <div class="tab" onclick="switchTab('sms')">短信登录</div>
            </div>

            <!-- 密码登录 -->
            <div id="loginForm">
                <div class="form-group" id="usernameGroup">
                    <label>用户名/邮箱</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名或邮箱" autocomplete="username">
                    <div class="input-icon"></div>
                    <div class="error-msg">请输入用户名或邮箱</div>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                    <div class="input-icon"></div>
                    <div class="error-msg">请输入密码（至少6位）</div>
                </div>

                <div class="form-group" style="display:flex;justify-content:space-between;align-items:center;">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#666;">
                        <input type="checkbox" id="rememberMe"> 记住我
                    </label>
                    <a href="#" style="font-size:13px;color:var(--jd-red);">忘记密码？</a>
                </div>

                <button class="auth-btn" onclick="handleLogin()">登 录</button>

                <div class="auth-other">
                    还没有账号？<a href="register.html">立即注册</a>
                </div>
            </div>

            <!-- 短信登录 -->
            <div id="smsForm" style="display:none;">
                <div class="form-group" id="phoneGroup">
                    <label>手机号</label>
                    <input type="text" id="smsPhone" placeholder="请输入手机号" maxlength="11">
                    <div class="input-icon"></div>
                    <div class="error-msg">请输入正确的手机号</div>
                </div>

                <div class="form-group" id="smsCodeGroup">
                    <label>验证码</label>
                    <div class="code-row">
                        <input type="text" id="smsCode" placeholder="请输入验证码" maxlength="6">
                        <button class="send-code" id="sendCodeBtn" onclick="sendSmsCode()">获取验证码</button>
                    </div>
                    <div class="error-msg">请输入验证码</div>
                </div>

                <button class="auth-btn" onclick="handleSmsLogin()">登 录</button>

                <div class="auth-other">
                    还没有账号？<a href="register.html">立即注册</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        <div class="container">
            <p class="student-info">学号：24215220111 &nbsp;&nbsp; 姓名：张乐 &nbsp;&nbsp; 《Web编程技术》大作业</p>
            <p>Copyright © 2024-2026 乐选购LEXUAN.com 版权所有</p>
        </div>
    </div>

    <script src="js/data.js?v=2"></script>
    <script>
        // 页面加载时检查已登录状态
        const currentUser = UserManager.getCurrentUser();
        if (currentUser) {
            window.location.href = 'index.html';
        }

        let currentTab = 'login';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.auth-tabs .tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'sms' && i === 1));
            });
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('smsForm').style.display = tab === 'sms' ? 'block' : 'none';
            // 清除所有错误状态
            document.querySelectorAll('.form-group').forEach(g => g.classList.remove('error', 'success'));
        }

        // ============ 密码登录校验 ============
        function validateLoginForm() {
            let isValid = true;
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            const usernameGroup = document.getElementById('usernameGroup');
            const passwordGroup = document.getElementById('passwordGroup');

            // 用户名校验
            if (!username) {
                usernameGroup.classList.add('error');
                usernameGroup.classList.remove('success');
                isValid = false;
            } else if (username.length < 2) {
                usernameGroup.classList.add('error');
                usernameGroup.querySelector('.error-msg').textContent = '用户名至少2个字符';
                usernameGroup.classList.remove('success');
                isValid = false;
            } else {
                usernameGroup.classList.remove('error');
                usernameGroup.classList.add('success');
            }

            // 密码校验
            if (!password) {
                passwordGroup.classList.add('error');
                passwordGroup.classList.remove('success');
                isValid = false;
            } else if (password.length < 6) {
                passwordGroup.classList.add('error');
                passwordGroup.querySelector('.error-msg').textContent = '密码至少6位';
                passwordGroup.classList.remove('success');
                isValid = false;
            } else {
                passwordGroup.classList.remove('error');
                passwordGroup.classList.add('success');
            }

            return isValid;
        }

        function handleLogin() {
            if (!validateLoginForm()) {
                showToast('请检查输入信息');
                return;
            }

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            const result = UserManager.login(username, password);

            if (result.success) {
                showToast('登录成功！正在跳转...');
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('jd_rememberedUser', username);
                }
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showToast(result.message);
                document.getElementById('passwordGroup').classList.add('error');
                document.getElementById('passwordGroup').classList.remove('success');
            }
        }

        // ============ 短信登录 ============
        let smsCountdown = 0;

        function validateSmsForm() {
            let isValid = true;
            const phone = document.getElementById('smsPhone').value.trim();
            const code = document.getElementById('smsCode').value.trim();

            const phoneGroup = document.getElementById('phoneGroup');
            const codeGroup = document.getElementById('smsCodeGroup');

            // 手机号校验
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phone) {
                phoneGroup.classList.add('error');
                phoneGroup.classList.remove('success');
                isValid = false;
            } else if (!phoneRegex.test(phone)) {
                phoneGroup.classList.add('error');
                phoneGroup.querySelector('.error-msg').textContent = '请输入正确的11位手机号';
                phoneGroup.classList.remove('success');
                isValid = false;
            } else {
                phoneGroup.classList.remove('error');
                phoneGroup.classList.add('success');
            }

            // 验证码校验
            if (!code || code.length !== 6) {
                codeGroup.classList.add('error');
                codeGroup.classList.remove('success');
                isValid = false;
            } else {
                codeGroup.classList.remove('error');
                codeGroup.classList.add('success');
            }

            return isValid;
        }

        function sendSmsCode() {
            if (smsCountdown > 0) return;

            const phone = document.getElementById('smsPhone').value.trim();
            const phoneRegex = /^1[3-9]\d{9}$/;

            if (!phoneRegex.test(phone)) {
                document.getElementById('phoneGroup').classList.add('error');
                showToast('请输入正确的手机号');
                return;
            }

            // 模拟发送验证码
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            localStorage.setItem('jd_smsCode', code);
            localStorage.setItem('jd_smsPhone', phone);

            showToast('验证码已发送：' + code + '（模拟）');
            smsCountdown = 60;
            updateSmsBtn();
        }

        function updateSmsBtn() {
            const btn = document.getElementById('sendCodeBtn');
            if (smsCountdown > 0) {
                btn.textContent = smsCountdown + '秒后重发';
                btn.classList.add('disabled');
                smsCountdown--;
                setTimeout(updateSmsBtn, 1000);
            } else {
                btn.textContent = '获取验证码';
                btn.classList.remove('disabled');
            }
        }

        function handleSmsLogin() {
            if (!validateSmsForm()) {
                showToast('请检查输入信息');
                return;
            }

            const phone = document.getElementById('smsPhone').value.trim();
            const code = document.getElementById('smsCode').value.trim();
            const savedCode = localStorage.getItem('jd_smsCode');
            const savedPhone = localStorage.getItem('jd_smsPhone');

            if (phone !== savedPhone || code !== savedCode) {
                showToast('验证码错误');
                return;
            }

            // 查找或创建用户
            const users = UserManager.getUsers();
            let user = users.find(u => u.phone === phone);

            if (!user) {
                // 新用户自动注册
                const result = UserManager.register({
                    username: '用户' + phone.slice(-4),
                    phone: phone,
                    email: phone + '@lexuan.com',
                    password: 'jd' + phone.slice(-4),
                });
                if (!result.success) {
                    showToast('登录失败');
                    return;
                }
            }

            const result = UserManager.login(user ? user.username : '用户' + phone.slice(-4), user ? user.password : 'jd' + phone.slice(-4));
            if (result.success) {
                showToast('登录成功！');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            }
        }

        // 加载记住的用户名
        const rememberedUser = localStorage.getItem('jd_rememberedUser');
        if (rememberedUser) {
            document.getElementById('loginUsername').value = rememberedUser;
            document.getElementById('rememberMe').checked = true;
        }

        // 回车键登录
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (currentTab === 'login') {
                    handleLogin();
                } else {
                    handleSmsLogin();
                }
            }
        });
    </script>
</body>
</html>
