<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐选购注册 - 欢迎注册乐选购账号</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-header">
        <div class="container">
            <div class="logo">
                <a href="index.html">乐选购<span style="font-size:16px;color:#999;margin-left:8px;">欢迎注册</span></a>
            </div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h2>注册乐选购账号</h2>

            <div class="form-group" id="regUsernameGroup">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名（4-20位字符）" maxlength="20" autocomplete="off">
                <div class="input-icon"></div>
                <div class="error-msg">请输入4-20位用户名</div>
            </div>

            <div class="form-group" id="regEmailGroup">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱地址" autocomplete="off">
                <div class="input-icon"></div>
                <div class="error-msg">请输入正确的邮箱地址</div>
            </div>

            <div class="form-group" id="regPhoneGroup">
                <label>手机号</label>
                <input type="text" id="regPhone" placeholder="请输入手机号" maxlength="11" autocomplete="off">
                <div class="input-icon"></div>
                <div class="error-msg">请输入正确的11位手机号</div>
            </div>

            <div class="form-group" id="regPasswordGroup">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="请输入密码（6-20位，含字母数字）" maxlength="20" autocomplete="new-password">
                <div class="input-icon"></div>
                <div class="error-msg">密码需要6-20位，包含字母和数字</div>
                <div class="password-strength" id="passwordStrength">
                    <div class="bar"></div>
                </div>
            </div>

            <div class="form-group" id="regConfirmGroup">
                <label>确认密码</label>
                <input type="password" id="regConfirm" placeholder="请再次输入密码" maxlength="20" autocomplete="new-password">
                <div class="input-icon"></div>
                <div class="error-msg">两次密码输入不一致</div>
            </div>

            <div class="agreement">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="agreeTerms" checked>
                    我已阅读并同意 <a href="#">《乐选购用户注册协议》</a> 和 <a href="#">《隐私政策》</a>
                </label>
            </div>

            <button class="auth-btn" onclick="handleRegister()">注 册</button>

            <div class="quick-register" style="margin-top:16px;text-align:center;">
                <span style="font-size:13px;color:#999;margin-right:8px;">快速体验：</span>
                <button onclick="quickRegister()" style="padding:6px 16px;background:var(--jd-red);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">一键注册测试账号</button>
            </div>

            <div class="auth-other">
                已有账号？<a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="student-info">学号：24215220111 &nbsp;&nbsp; 姓名：张乐 &nbsp;&nbsp; 《Web编程技术》大作业</p>
            <p>Copyright © 2024-2026 乐选购LEXUAN.com 版权所有</p>
        </div>
    </div>

    <script src="js/data.js?v=2"></script>
    <script>
        // 已登录则跳转
        if (UserManager.getCurrentUser()) {
            window.location.href = 'index.html';
        }

        // ============ 实时校验 ============
        document.getElementById('regUsername').addEventListener('input', function() {
            validateField('regUsernameGroup', this.value.trim(), v => v.length >= 4 && v.length <= 20, '请输入4-20位用户名');
        });

        document.getElementById('regEmail').addEventListener('input', function() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            validateField('regEmailGroup', this.value.trim(), v => emailRegex.test(v), '请输入正确的邮箱地址');
        });

        document.getElementById('regPhone').addEventListener('input', function() {
            const phoneRegex = /^1[3-9]\d{9}$/;
            validateField('regPhoneGroup', this.value.trim(), v => phoneRegex.test(v), '请输入正确的11位手机号');
        });

        document.getElementById('regPassword').addEventListener('input', function() {
            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d).{6,20}$/;
            validateField('regPasswordGroup', this.value.trim(), v => passwordRegex.test(v), '密码需要6-20位，包含字母和数字');
            updatePasswordStrength(this.value.trim());
        });

        document.getElementById('regConfirm').addEventListener('input', function() {
            const password = document.getElementById('regPassword').value.trim();
            validateField('regConfirmGroup', this.value.trim(), v => v === password && v !== '', '两次密码输入不一致');
        });

        function validateField(groupId, value, validator, errorMsg) {
            const group = document.getElementById(groupId);
            group.classList.remove('error', 'success');
            if (!value) {
                group.classList.add('error');
                group.querySelector('.error-msg').textContent = errorMsg;
            } else if (!validator(value)) {
                group.classList.add('error');
                group.querySelector('.error-msg').textContent = errorMsg;
            } else {
                group.classList.add('success');
            }
        }

        // ============ 密码强度 ============
        function updatePasswordStrength(password) {
            const strengthEl = document.getElementById('passwordStrength');
            strengthEl.className = 'password-strength';

            if (!password) return;

            let score = 0;
            if (password.length >= 6) score++;
            if (password.length >= 10) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            if (score <= 2) strengthEl.className = 'password-strength strength-weak';
            else if (score <= 3) strengthEl.className = 'password-strength strength-medium';
            else strengthEl.className = 'password-strength strength-strong';
        }

        // ============ 注册提交 ============
        function validateRegisterForm() {
            let isValid = true;
            const fields = [
                { id: 'regUsername', groupId: 'regUsernameGroup', validator: v => v.length >= 4 && v.length <= 20, msg: '请输入4-20位用户名' },
                { id: 'regEmail', groupId: 'regEmailGroup', validator: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), msg: '请输入正确的邮箱地址' },
                { id: 'regPhone', groupId: 'regPhoneGroup', validator: v => /^1[3-9]\d{9}$/.test(v), msg: '请输入正确的11位手机号' },
                { id: 'regPassword', groupId: 'regPasswordGroup', validator: v => /^(?=.*[A-Za-z])(?=.*\d).{6,20}$/.test(v), msg: '密码需要6-20位，包含字母和数字' },
            ];

            fields.forEach(f => {
                const value = document.getElementById(f.id).value.trim();
                const group = document.getElementById(f.groupId);
                group.classList.remove('error', 'success');
                if (!f.validator(value)) {
                    group.classList.add('error');
                    group.querySelector('.error-msg').textContent = f.msg;
                    isValid = false;
                } else {
                    group.classList.add('success');
                }
            });

            // 确认密码
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regConfirm').value.trim();
            const confirmGroup = document.getElementById('regConfirmGroup');
            confirmGroup.classList.remove('error', 'success');
            if (confirm !== password || !confirm) {
                confirmGroup.classList.add('error');
                isValid = false;
            } else {
                confirmGroup.classList.add('success');
            }

            // 协议
            if (!document.getElementById('agreeTerms').checked) {
                showToast('请先阅读并同意用户协议');
                isValid = false;
            }

            return isValid;
        }

        function handleRegister() {
            if (!validateRegisterForm()) {
                showToast('请检查输入信息');
                return;
            }

            const userData = {
                username: document.getElementById('regUsername').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                phone: document.getElementById('regPhone').value.trim(),
                password: document.getElementById('regPassword').value.trim(),
            };

            const result = UserManager.register(userData);

            if (result.success) {
                showToast('注册成功！正在跳转登录...');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                showToast(result.message);
            }
        }

        // ============ 快速注册 ============
        function quickRegister() {
            const testUser = {
                username: 'zhangle',
                email: 'zhangle@qq.com',
                phone: '13800138000',
                password: 'ZhangLe123',
            };
            document.getElementById('regUsername').value = testUser.username;
            document.getElementById('regEmail').value = testUser.email;
            document.getElementById('regPhone').value = testUser.phone;
            document.getElementById('regPassword').value = testUser.password;
            document.getElementById('regConfirm').value = testUser.password;
            // 触发校验
            ['regUsername', 'regEmail', 'regPhone', 'regPassword', 'regConfirm'].forEach(id => {
                document.getElementById(id).dispatchEvent(new Event('input'));
            });
            showToast('已填充测试账号，点击注册即可');
        }

        // 回车提交
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleRegister();
            }
        });
    </script>
</body>
</html>
